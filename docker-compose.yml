version: "3.9"

services:
  mcp:
    build: .
    command: python -m mcp_server.main
    volumes:
      - .:/app
    ports:
      - "9000:9000"
    env_file:
      - .env

  math_agent:
    build: .
    command: uvicorn agents.math_agent.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    env_file:
      - .env

  text_agent:
    build: .
    command: uvicorn agents.text_agent.main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - .:/app
    ports:
      - "8002:8002"
    env_file:
      - .env

  expense_agent:
    build: .
    command: uvicorn agents.expense_agent.main:app --host 0.0.0.0 --port 8003 --reload
    volumes:
      - .:/app
    ports:
      - "8003:8003"
    env_file:
      - .env

  time_agent:
    build: .
    command: uvicorn agents.time_agent.main:app --host 0.0.0.0 --port 8004 --reload
    volumes:
      - .:/app
    ports:
      - "8004:8004"
    env_file:
      - .env

  orchestrator:
    build: .
    command: uvicorn orchestrator.main:app --host 0.0.0.0 --port 8005 --reload
    volumes:
      - .:/app
    ports:
      - "8005:8005"
    env_file:
      - .env

  auth:
    build: .
    command: uvicorn auth.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env